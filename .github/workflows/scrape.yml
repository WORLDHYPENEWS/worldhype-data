name: scrape-news

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run scrape

      - name: Commit updated feed
        run: |
          git config user.name "worldhype-bot"
          git config user.email "bot@worldhypenews.com"
          git add feed.json
          git commit -m "update feed $(date -u +%FT%TZ)" || echo "no changes"
          git push
